        @keyframes fadeIn {

            }

        .logo-area {

        }

        .logo-img {

            height: 64px;

            object-fit: cover;
        }

        .logo-title {
            font-size: 24px;
            font-weight: 700;
            color: #64B5F6;
        }

        @media (max-width: 480px) {
            .logo-img {
                width: 50px;
                height: 50px;
            }
            .logo-title {

            }
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {

            font-weight: 500;

        input {

            border: 1px solid #2A3A4A;

            font-size: 15px;

        input:focus {

        }

        .btn {

            border: none;
            border-radius: 12px;
            font-size: 15px;

            cursor: pointer;

        .btn:active {

        .chat-input {
            flex: 1;

            border: none;

            border-radius: 20px;

        @keyframes fadeOut {
            0% { opacity: 1; }

        }
    </style>
</head>
<body>

    <div class="footer">
        <p>© 2026 IT Global. Все права защищены.</p>

    <script type="module">
        document.addEventListener('keyup', function(e) {
            if (e.key === 'PrintScreen') {
                alert('📸 Создание скриншотов запрещено!');
                return false;
            }
        });
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        const firebaseConfig = {
            apiKey: "AIzaSyA6GGJxAiao77U7_9mBUEjftmS_FnSWbIw",
            authDomain: "glob-data.firebaseapp.com",
            projectId: "glob-data",
            storageBucket: "glob-data.firebasestorage.app",
            messagingSenderId: "122757049174",
            appId: "1:122757049174:web:ebb425edd0e1a8ea9a44f7"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, addDoc, orderBy, onSnapshot, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        setPersistence(auth, browserLocalPersistence);

        let currentUser = null;
        let currentUserData = null;
        let currentContact = null;
        let messagesUnsubscribe = null;
        let destructTimeouts = {};

        const SELF_DESTRUCT_DELAY = 5000;
        const ENCRYPTION_LAYERS = 21;

        function generateGlobalId() {
            const digits = '0123456789';
            const letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let result = [];
            for (let i = 0; i < 5; i++) result.push(digits[Math.floor(Math.random() * digits.length)]);
            for (let i = 0; i < 10; i++) {
                let letter = letters[Math.floor(Math.random() * letters.length)];
                letter = Math.random() > 0.5 ? letter.toUpperCase() : letter.toLowerCase();
                result.push(letter);
            }
            for (let i = 0; i < 7; i++) {
                let char = (digits + letters)[Math.floor(Math.random() * (digits + letters).length)];
                if (char.match(/[a-zA-Z]/)) char = Math.random() > 0.5 ? char.toUpperCase() : char.toLowerCase();
                result.push(char);
            }
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result.join('');
        }

        // Шифрование
        function base64Encrypt(text) {
            return btoa(unescape(encodeURIComponent(text)));
        }
        
        function base64Decrypt(text) {
            try {
                return decodeURIComponent(escape(atob(text)));
            } catch(e) {
                return text;
            }
        }
        
        function reverseEncrypt(text) {
            return text.split('').reverse().join('');
        }
        
        function reverseDecrypt(text) {
            return text.split('').reverse().join('');
        }
        
        function caesarEncrypt(text, shift = 3) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                let code = text.charCodeAt(i);
                result += String.fromCharCode(code + shift);
            }
            return result;
        }
        
        function caesarDecrypt(text, shift = 3) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                let code = text.charCodeAt(i);
                result += String.fromCharCode(code - shift);
            }
            return result;
        }
        
        function xorEncrypt(text, key = 42) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key);
            }
            return result;
        }
        
        function xorDecrypt(text, key = 42) {
            return xorEncrypt(text, key);
        }
        
        async function multiLayerEncrypt(text) {
            let encrypted = text;
            for (let i = 0; i < ENCRYPTION_LAYERS; i++) {
                let method = i % 4;
                if (method === 0) encrypted = base64Encrypt(encrypted);
                else if (method === 1) encrypted = reverseEncrypt(encrypted);
                else if (method === 2) encrypted = caesarEncrypt(encrypted, (i % 5) + 1);
                else encrypted = xorEncrypt(encrypted, (i % 10) + 1);
            }
            return encrypted;
        }
        
        async function multiLayerDecrypt(encrypted) {
            let decrypted = encrypted;
            for (let i = ENCRYPTION_LAYERS - 1; i >= 0; i--) {
                let method = i % 4;
                if (method === 0) decrypted = base64Decrypt(decrypted);
                else if (method === 1) decrypted = reverseDecrypt(decrypted);
                else if (method === 2) decrypted = caesarDecrypt(decrypted, (i % 5) + 1);
                else decrypted = xorDecrypt(decrypted, (i % 10) + 1);
            }
            return decrypted;
        }

        function showDestructNotice() {
            let notice = document.createElement('div');
            notice.className = 'destruct-notice';
            notice.textContent = '💣 Сообщение самоуничтожится через 5 секунд!';
            document.body.appendChild(notice);
            setTimeout(() => notice.remove(), SELF_DESTRUCT_DELAY);
        }

        function showMessageUI(text, isError = true) {
            let msgDiv = document.getElementById('authMessage');
            if (msgDiv) {
                msgDiv.textContent = text;
                msgDiv.className = `message ${isError ? 'message-error' : 'message-success'}`;
                msgDiv.style.display = 'block';
                setTimeout(() => { if(msgDiv) msgDiv.style.display = 'none'; }, 3000);
            }
        }

        async function updatePresence() {
            if (!currentUser) return;
            const userRef = doc(db, "users", currentUser.uid);
            await updateDoc(userRef, {
                lastSeen: new Date(),
                online: true
            }).catch(() => {});
        }

        window.addEventListener('beforeunload', async () => {
            if (currentUser) {
                const userRef = doc(db, "users", currentUser.uid);
                await updateDoc(userRef, { online: false, lastSeen: new Date() }).catch(() => {});
            }
        });

        setInterval(updatePresence, 30000);

        window.closeChat = function() {
            document.getElementById('contactsScreen').classList.remove('hide-on-mobile');
            document.getElementById('chatScreen').classList.remove('show-on-mobile');
            if (messagesUnsubscribe) messagesUnsubscribe();
            currentContact = null;
            document.getElementById('chatInputArea').style.display = 'none';
            document.getElementById('chatName').innerText = 'Выберите собеседника';
            document.getElementById('addContactBtn').style.display = 'none';
        };

        window.addToContacts = async () => {
            if (!currentContact) {
                alert('Нет выбранного контакта');
                return;
            }
            
            try {
                const currentUserRef = doc(db, "users", currentUser.uid);
                const currentUserSnap = await getDoc(currentUserRef);
                const currentContacts = currentUserSnap.data().contacts || [];
                
                if (currentContacts.some(c => c.uid === currentContact.uid)) {
                    alert('Этот пользователь уже в ваших контактах');
                    document.getElementById('addContactBtn').style.display = 'none';
                    return;
                }
                
                // Получаем полные данные о контакте
                let contactData = currentContact;
                
                // Если данных нет, загружаем из Firestore
                if (!contactData.globalId || !contactData.nickname || !contactData.email) {
                    const contactDoc = await getDoc(doc(db, "users", currentContact.uid));
                    if (contactDoc.exists()) {
                        const data = contactDoc.data();
                        contactData = {
                            uid: currentContact.uid,
                            globalId: data.globalId || 'unknown',
                            nickname: data.nickname || 'User',
                            email: data.email || 'noemail@example.com'
                        };
                        currentContact = contactData;
                    } else {
                        alert('Пользователь не найден в базе данных');
                        return;
                    }
                }
                
                // Проверяем, что все поля существуют
                if (!contactData.uid || !contactData.globalId || !contactData.nickname) {
                    console.error('Ошибка: недостаточно данных о контакте', contactData);
                    alert('Ошибка: недостаточно данных о контакте');
                    return;
                }
                
                await updateDoc(currentUserRef, {
                    contacts: arrayUnion({
                        uid: contactData.uid,
                        globalId: contactData.globalId,
                        nickname: contactData.nickname,
                        email: contactData.email || 'noemail@example.com',
                        addedAt: new Date()
                    })
                });
                
                document.getElementById('addContactBtn').style.display = 'none';
                alert(`✅ ${contactData.nickname || contactData.globalId} добавлен в контакты`);
                loadChats();
            } catch (error) {
                console.error('Ошибка добавления:', error);
                alert('Ошибка при добавлении в контакты: ' + error.message);
            }
        };

        window.register = async () => {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            if (!email || !password) { showMessageUI('Заполните все поля', true); return; }
            if (password.length < 6) { showMessageUI('Пароль должен быть минимум 6 символов', true); return; }
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const globalId = generateGlobalId();
                await setDoc(doc(db, "users", userCred.user.uid), {
                    email: email,
                    globalId: globalId,
                    nickname: email.split('@')[0],
                    createdAt: new Date(),
                    contacts: [],
                    online: true,
                    lastSeen: new Date()
                });
                showMessageUI('Регистрация успешна!', false);
                setTimeout(() => window.showLogin(), 1500);
            } catch (error) { showMessageUI(error.message, true); }
        };

        window.login = async () => {
            const identifier = document.getElementById('loginIdentifier').value;
            const password = document.getElementById('loginPassword').value;
            if (!identifier || !password) { showMessageUI('Заполните все поля', true); return; }
            try {
                let email = identifier;
                if (!identifier.includes('@')) {
                    const usersQuery = query(collection(db, "users"), where("globalId", "==", identifier));
                    const usersSnap = await getDocs(usersQuery);
                    if (usersSnap.empty) { showMessageUI('Global ID не найден', true); return; }
                    email = usersSnap.docs[0].data().email;
                }
                await signInWithEmailAndPassword(auth, email, password);
                await updatePresence();
            } catch (error) { showMessageUI('Неверный email/Global ID или пароль', true); }
        };

        window.logout = async () => {
            if (messagesUnsubscribe) messagesUnsubscribe();
            if (currentUser) {
                const userRef = doc(db, "users", currentUser.uid);
                await updateDoc(userRef, { online: false, lastSeen: new Date() }).catch(() => {});
            }
            await signOut(auth);
        };

        window.searchAndStartChat = async () => {
            const searchInput = document.getElementById('searchInput').value.trim();
            if (!searchInput) return;
            
            const usersQuery = query(collection(db, "users"), where("globalId", "==", searchInput));
            const usersSnap = await getDocs(usersQuery);
            if (usersSnap.empty) { alert('Пользователь не найден'); return; }
            
            const userDoc = usersSnap.docs[0];
            const userData = userDoc.data();
            if (userDoc.id === currentUser.uid) { alert('Это вы сами'); return; }
            
            const contact = {
                uid: userDoc.id,
                globalId: userData.globalId,
                nickname: userData.nickname,
                email: userData.email
            };
            
            document.getElementById('searchInput').value = '';
            await selectContact(contact);
        };

        async function loadChats() {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            const userData = userDoc.data();
            const contacts = userData.contacts || [];
            
            const chatsSet = new Map();
            
            for (const contact of contacts) {
                chatsSet.set(contact.uid, {
                    uid: contact.uid,
                    globalId: contact.globalId,
                    nickname: contact.nickname,
                    email: contact.email,
                    isContact: true
                });
            }
            
            // Находим чаты с пользователями, которых нет в контактах
            const chatsQuery = query(collection(db, "chats"));
            const chatsSnap = await getDocs(chatsQuery);
            for (const chatDoc of chatsSnap.docs) {
                const chatData = chatDoc.data();
                const participants = chatData.participants || [];
                if (participants.includes(currentUser.uid)) {
                    const otherId = participants.find(p => p !== currentUser.uid);
                    if (otherId && !chatsSet.has(otherId)) {
                        const otherDoc = await getDoc(doc(db, "users", otherId));
                        if (otherDoc.exists()) {
                            const otherData = otherDoc.data();
                            chatsSet.set(otherId, {
                                uid: otherId,
                                globalId: otherData.globalId,
                                nickname: otherData.nickname,
                                email: otherData.email,
                                isContact: false
                            });
                        }
                    }
                }
            }
            
            const chatsList = document.getElementById('chatsList');
            chatsList.innerHTML = '';
            
            if (chatsSet.size === 0) {
                chatsList.innerHTML = '<div style="padding: 20px; text-align: center; color: #88A9C4;">Нет чатов<br><span style="font-size: 11px;">Найдите пользователя по Global ID</span></div>';
                return;
            }
            
            for (const [uid, chat] of chatsSet) {
                const chatDiv = document.createElement('div');
                chatDiv.className = 'chat-item';
                chatDiv.onclick = () => selectContact(chat);
                chatDiv.innerHTML = `
                    <div class="chat-avatar-small">${chat.nickname?.charAt(0).toUpperCase() || '👤'}</div>
                    <div class="chat-info-small">
                        <div class="chat-name">${chat.nickname || chat.globalId?.substring(0, 8)}</div>
                        <div class="chat-last-message">${chat.globalId?.substring(0, 12)}...</div>
                    </div>
                `;
                chatsList.appendChild(chatDiv);
            }
        }

        async function selectContact(contact) {
            // Получаем полные данные о контакте
            let fullContact = contact;
            if (!contact.globalId || !contact.nickname || !contact.email) {
                const contactDoc = await getDoc(doc(db, "users", contact.uid));
                if (contactDoc.exists()) {
                    const data = contactDoc.data();
                    fullContact = {
                        uid: contact.uid,
                        globalId: data.globalId || 'unknown',
                        nickname: data.nickname || 'User',
                        email: data.email || 'noemail@example.com'
                    };
                } else {
                    alert('Пользователь не найден');
                    return;
                }
            }
            currentContact = fullContact;
            
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            const userData = userDoc.data();
            const isContact = (userData.contacts || []).some(c => c.uid === currentContact.uid);
            
            const isOnline = false;
            document.getElementById('chatName').innerHTML = currentContact.nickname || currentContact.globalId?.substring(0, 8);
            document.getElementById('chatStatus').innerHTML = `
                <span class="online-status ${isOnline ? 'online' : 'offline'}"></span>
                ${isOnline ? 'онлайн' : 'офлайн'} | 🔒 21 слой шифрования
            `;
            document.getElementById('chatAvatar').innerHTML = currentContact.nickname?.charAt(0).toUpperCase() || '🧊';
            document.getElementById('chatInputArea').style.display = 'flex';
            
            if (!isContact) {
                document.getElementById('addContactBtn').style.display = 'block';
            } else {
                document.getElementById('addContactBtn').style.display = 'none';
            }
            
            if (window.innerWidth <= 768) {
                document.getElementById('contactsScreen').classList.add('hide-on-mobile');
                document.getElementById('chatScreen').classList.add('show-on-mobile');
            }
            
            if (messagesUnsubscribe) messagesUnsubscribe();
            
            const chatId = [currentUser.uid, currentContact.uid].sort().join('_');
            const chatRef = doc(db, "chats", chatId);
            const chatDoc = await getDoc(chatRef);
            if (!chatDoc.exists()) {
                await setDoc(chatRef, { 
                    participants: [currentUser.uid, currentContact.uid], 
                    createdAt: new Date(),
                    lastMessageTime: null
                });
            }
            
            const messagesRef = collection(db, "chats", chatId, "messages");
            const q = query(messagesRef, orderBy("timestamp", "asc"));
            
            messagesUnsubscribe = onSnapshot(q, async (snapshot) => {
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = '';
                for (const docSnap of snapshot.docs) {
                    const msg = docSnap.data();
                    const isSent = msg.from === currentUser.uid;
                    let decryptedText = msg.text;
                    
                    if (msg.encrypted) {
                        try {
                            decryptedText = await multiLayerDecrypt(msg.text);
                        } catch(e) { 
                            decryptedText = '🔒 Зашифрованное сообщение (21 слой)'; 
                        }
                    }
                    
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message-bubble ${isSent ? 'message-sent' : 'message-received'}`;
                    messageDiv.innerHTML = `
                        <div>${escapeHtml(decryptedText)}</div>
                        <div class="message-time">${msg.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || ''}</div>
                        <div class="message-self-destruct">💣 Самоуничтожится через 5 секунд (21 слой)</div>
                    `;
                    messagesArea.appendChild(messageDiv);
                    
                    if (msg.messageId && !destructTimeouts[msg.messageId] && !isSent) {
                        destructTimeouts[msg.messageId] = setTimeout(async () => {
                            await deleteDoc(doc(db, "chats", chatId, "messages", docSnap.id));
                            delete destructTimeouts[msg.messageId];
                        }, SELF_DESTRUCT_DELAY);
                        showDestructNotice();
                    }
                }
                messagesArea.scrollTop = messagesArea.scrollHeight;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.sendMessage = async () => {
            const messageInput = document.getElementById('messageInput');
            const text = messageInput.value.trim();
            if (!text || !currentContact) return;
            
            const chatId = [currentUser.uid, currentContact.uid].sort().join('_');
            const encryptedText = await multiLayerEncrypt(text);
            const messageId = Date.now().toString() + Math.random().toString(36);
            
            await addDoc(collection(db, "chats", chatId, "messages"), {
                from: currentUser.uid,
                to: currentContact.uid,
                text: encryptedText,
                encrypted: true,
                timestamp: new Date(),
                messageId: messageId,
                encryptionLayers: ENCRYPTION_LAYERS
            });
            
            messageInput.value = '';
        };

        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.searchAndStartChat(); });

        window.showRegister = () => {
            document.getElementById('loginMode').style.display = 'none';
            document.getElementById('registerMode').style.display = 'block';
            document.getElementById('authMessage').style.display = 'none';
        };
        window.showLogin = () => {
            document.getElementById('loginMode').style.display = 'block';
            document.getElementById('registerMode').style.display = 'none';
            document.getElementById('authMessage').style.display = 'none';
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                currentUserData = userDoc.data();
                if (!currentUserData) {
                    const globalId = generateGlobalId();
                    await setDoc(doc(db, "users", user.uid), {
                        email: user.email,
                        globalId: globalId,
                        nickname: user.email.split('@')[0],
                        createdAt: new Date(),
                        contacts: [],
                        online: true,
                        lastSeen: new Date()
                    });
                    currentUserData = { globalId, nickname: user.email.split('@')[0] };
                }
                
                await updatePresence();
                
                document.getElementById('authForm').style.display = 'none';
                document.getElementById('messengerApp').style.display = 'flex';
                document.getElementById('userAvatar').innerText = currentUserData.nickname?.charAt(0).toUpperCase() || 'U';
                document.getElementById('userName').innerText = currentUserData.nickname || user.email.split('@')[0];
                const shortGlobalId = currentUserData.globalId ? currentUserData.globalId.substring(0, 12) + '...' : '—';
                document.getElementById('userGlobalId').innerHTML = shortGlobalId;
                
                loadChats();
            } else {
                if (messagesUnsubscribe) messagesUnsubscribe();
                currentContact = null;
                document.getElementById('authForm').style.display = 'flex';
                document.getElementById('messengerApp').style.display = 'none';
                document.getElementById('loginIdentifier').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('contactsScreen').classList.remove('hide-on-mobile');
                document.getElementById('chatScreen').classList.remove('show-on-mobile');
            }
        });
    </script>
</body>
</html>
