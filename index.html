<!DOCTYPE html>
<html>
<head>
    <title>Тест Firebase</title>
</head>
<body>
    <h1>Тест соединения</h1>
    <div id="status">Проверка...</div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyA6GGJxAiao77U7_9mBUEjftmS_FnSWbIw",
            authDomain: "glob-data.firebaseapp.com",
            projectId: "glob-data",
            storageBucket: "glob-data.firebasestorage.app",
            messagingSenderId: "122757049174",
            appId: "1:122757049174:web:ebb425edd0e1a8ea9a44f7"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore();

        document.getElementById('status').innerHTML = 'Подключение...';
        
        try {
            await setDoc(doc(db, "test", "test"), { message: "Hello", time: new Date() });
            document.getElementById('status').innerHTML = '✅ Firebase работает!';
            document.getElementById('status').style.color = 'green';
        } catch (error) {
            document.getElementById('status').innerHTML = '❌ Ошибка: ' + error.message;
            document.getElementById('status').style.color = 'red';
        }
    </script>
</body>
</html>
