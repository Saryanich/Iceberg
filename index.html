<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0, viewport-fit=cover">
    <title>Айсберг - Защищённый мессенджер</title>
    
    <!-- Логотип -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/8JY0bXs/IMG-0335.jpg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/8JY0bXs/IMG-0335.jpg">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Айсберг">
    <meta name="theme-color" content="#0A0F1E">
    
    <!-- Защита от скриншотов -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: #0A0F1E;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Защита от скриншотов (через CSS) */
        .screenshot-protect {
            position: relative;
        }
        
        .screenshot-protect::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 9999;
        }

        /* Контейнер */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Форма входа */
        .auth-card {
            background: #1A2A3A;
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 90%;
            width: 400px;
            margin: auto;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 20px 16px;
                border-radius: 20px;
            }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-img {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            margin: 0 auto 12px;
            display: block;
            object-fit: cover;
        }

        .logo-title {
            font-size: 24px;
            font-weight: 700;
            color: #64B5F6;
        }

        @media (max-width: 480px) {
            .logo-img {
                width: 50px;
                height: 50px;
            }
            .logo-title {
                font-size: 20px;
            }
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #88A9C4;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #2A3A4A;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: #0F1A2A;
            color: #FFFFFF;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #64B5F6;
            box-shadow: 0 0 0 3px rgba(100, 181, 246, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, #64B5F6, #1E88E5);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            color: #64B5F6;
            border: 1px solid #2A3A4A;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #2A3A4A;
        }

        .divider-text {
            font-size: 11px;
            color: #4A6A8A;
        }

        .switch-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #64B5F6;
            cursor: pointer;
        }

        .message {
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
            padding: 10px;
            border-radius: 12px;
            display: none;
        }

        .message-success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .message-error {
            background: rgba(229, 57, 53, 0.2);
            color: #E53935;
        }

        /* Мессенджер - как WhatsApp */
        .messenger-container {
            display: flex;
            height: calc(100vh - 60px);
            width: 100%;
            background: #0A0F1E;
            position: relative;
        }

        /* Список контактов (всегда виден на ПК, на телефоне - только когда чат закрыт) */
        .contacts-screen {
            width: 100%;
            max-width: 400px;
            background: #0F1A2A;
            border-right: 1px solid #1A2A3A;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .contacts-screen {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 10;
                transform: translateX(0);
            }
            .contacts-screen.hide-on-mobile {
                transform: translateX(-100%);
            }
            .chat-screen {
                width: 100%;
            }
        }

        /* Экран чата */
        .chat-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0A0F1E;
        }

        @media (max-width: 768px) {
            .chat-screen {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 100%;
                z-index: 20;
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }
            .chat-screen.show-on-mobile {
                transform: translateX(0);
            }
        }

        /* Шапка чата */
        .chat-header {
            padding: 16px;
            background: #0F1A2A;
            border-bottom: 1px solid #1A2A3A;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #64B5F6;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            display: none;
        }

        @media (max-width: 768px) {
            .back-btn {
                display: block;
            }
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #64B5F6, #1E88E5);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-info h3 {
            font-size: 16px;
            color: white;
            margin-bottom: 2px;
        }

        .chat-info p {
            font-size: 11px;
            color: #88A9C4;
        }

        /* Список контактов */
        .user-profile {
            padding: 16px;
            border-bottom: 1px solid #1A2A3A;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #64B5F6, #1E88E5);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .user-details h4 {
            font-size: 14px;
            color: white;
            margin-bottom: 2px;
        }

        .user-details p {
            font-size: 10px;
            color: #88A9C4;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #88A9C4;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
        }

        .search-area {
            padding: 12px;
            border-bottom: 1px solid #1A2A3A;
        }

        .search-input {
            width: 100%;
            background: #1A2A3A;
            border: none;
            padding: 10px 14px;
            font-size: 14px;
            border-radius: 20px;
            color: white;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #1A2A3A;
        }

        .contact-item:hover {
            background: #1A2A3A;
        }

        .contact-item.active {
            background: #1E88E5;
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            background: #2A3A4A;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: white;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-size: 15px;
            font-weight: 500;
            color: white;
            margin-bottom: 2px;
        }

        .contact-status {
            font-size: 11px;
            color: #88A9C4;
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-sent {
            background: #1E88E5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-received {
            background: #1A2A3A;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 9px;
            color: #88A9C4;
            margin-top: 4px;
        }

        .message-self-destruct {
            font-size: 9px;
            color: #FF9800;
            margin-top: 2px;
        }

        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid #1A2A3A;
            display: flex;
            gap: 10px;
            background: #0F1A2A;
        }

        .chat-input {
            flex: 1;
            background: #1A2A3A;
            border: none;
            padding: 12px 16px;
            font-size: 15px;
            border-radius: 24px;
            color: white;
        }

        .send-btn {
            width: auto;
            padding: 12px 24px;
        }

        /* Футер */
        .footer {
            text-align: center;
            padding: 12px 16px;
            font-size: 10px;
            color: #4A6A8A;
            background: #0A0F1E;
            border-top: 1px solid #1A2A3A;
        }

        .footer a {
            color: #64B5F6;
            text-decoration: none;
        }

        /* Уведомление */
        .destruct-notice {
            position: fixed;
            bottom: 70px;
            right: 10px;
            background: rgba(255, 152, 0, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            z-index: 200;
            animation: fadeOut 10s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="app-container screenshot-protect">
        <!-- Форма входа -->
        <div id="authForm" style="display: flex; height: 100vh; align-items: center; justify-content: center;">
            <div class="auth-card">

                </div>
                
                <div id="loginMode">

        <!-- Основной интерфейс мессенджера -->
        <div id="messengerApp" style="display: none;" class="messenger-container">
            <!-- Экран контактов -->
            <div id="contactsScreen" class="contacts-screen">
                <div class="user-profile">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">U</div>

                    <input type="text" class="search-input" placeholder="🔍 Найти по Global ID..." id="searchInput">

            <!-- Экран чата -->
            <div id="chatScreen" class="chat-screen">

                    <div class="chat-avatar" id="chatAvatar">🧊</div>

                        <h3 id="chatName">Выберите собеседника</h3>
                        <p id="chatStatus">🔒 Защищённое соединение</p>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="chat-input-area" id="chatInputArea" style="display: none;">
                    <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="btn btn-primary send-btn" onclick="sendMessage()">🔒 Отправить</button>

    <!-- Футер -->
    <div class="footer">
        <p>© 2026 IT Global. Все права защищены.</p>
        <p>Связь с разработчиком: <a href="mailto:vasiliy.novikov389@gmail.com">vasiliy.novikov389@gmail.com</a></p>

    <script type="module">
        // Защита от скриншотов (попытка через JS)
        document.addEventListener('keyup', function(e) {
            if (e.key === 'PrintScreen') {
                alert('📸 Создание скриншотов запрещено в целях безопасности!');
                return false;
            }
        });
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // GLoB Data Firebase конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyA6GGJxAiao77U7_9mBUEjftmS_FnSWbIw",
            authDomain: "glob-data.firebaseapp.com",
            projectId: "glob-data",
            storageBucket: "glob-data.firebasestorage.app",
            messagingSenderId: "122757049174",
            appId: "1:122757049174:web:ebb425edd0e1a8ea9a44f7"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, addDoc, orderBy, onSnapshot, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();

        setPersistence(auth, browserLocalPersistence);

        let currentUser = null;
        let currentUserData = null;
        let currentContact = null;
        let contacts = [];
        let messagesUnsubscribe = null;
        let destructTimeouts = {};

        // Генерация Global ID
        function generateGlobalId() {
            const digits = '0123456789';
            const letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let result = [];
            for (let i = 0; i < 5; i++) result.push(digits[Math.floor(Math.random() * digits.length)]);
            for (let i = 0; i < 10; i++) {
                let letter = letters[Math.floor(Math.random() * letters.length)];
                letter = Math.random() > 0.5 ? letter.toUpperCase() : letter.toLowerCase();
                result.push(letter);
            }
            for (let i = 0; i < 7; i++) {
                let char = (digits + letters)[Math.floor(Math.random() * (digits + letters).length)];
                if (char.match(/[a-zA-Z]/)) char = Math.random() > 0.5 ? char.toUpperCase() : char.toLowerCase();
                result.push(char);
            }
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result.join('');
        }

        // ============ ШИФРОВАНИЕ ============
        const ERCC_DICT = {
            'а': 1.24, 'б': 1.63, 'в': 1.95, 'г': 1.08, 'д': 1.37,
            'е': 1.41, 'ё': 1.45, 'ж': 1.79, 'з': 1.52, 'и': 1.86,
            'й': 1.30, 'к': 1.74, 'л': 1.29, 'м': 1.57, 'н': 1.84,
            'о': 1.69, 'п': 1.15, 'р': 1.48, 'с': 1.67, 'т': 1.20,
            'у': 1.55, 'ф': 1.83, 'х': 1.91, 'ц': 1.39, 'ч': 1.72,
            'ш': 1.53, 'щ': 1.88, 'ъ': 1.66, 'ы': 1.42, 'ь': 1.35,
            'э': 1.81, 'ю': 1.47, 'я': 1.90, ' ': 0.0,
            'a': 1.01, 'b': 1.02, 'c': 1.03, 'd': 1.04, 'e': 1.05,
            'f': 1.06, 'g': 1.07, 'h': 1.08, 'i': 1.09, 'j': 1.10,
            'k': 1.11, 'l': 1.12, 'm': 1.13, 'n': 1.14, 'o': 1.15,
            'p': 1.16, 'q': 1.17, 'r': 1.18, 's': 1.19, 't': 1.20,
            'u': 1.21, 'v': 1.22, 'w': 1.23, 'x': 1.24, 'y': 1.25, 'z': 1.26
        };
        
        const ERCC_REVERSE = {};
        for (let [k, v] of Object.entries(ERCC_DICT)) {
            ERCC_REVERSE[Math.round(v * 10000) / 10000] = k;
        }

        function erccEncrypt(text) {
            let result = [];
            for (let ch of text) {
                if (ERCC_DICT[ch.toLowerCase()] !== undefined) {
                    result.push(ERCC_DICT[ch.toLowerCase()].toFixed(4));
                } else {
                    result.push(ch);
                }
            }
            return result.join(' ');
        }

        function erccDecrypt(text) {
            let result = [];
            let parts = text.split(' ');
            for (let part of parts) {
                let num = parseFloat(part);
                if (!isNaN(num)) {
                    let rounded = Math.round(num * 10000) / 10000;
                    if (ERCC_REVERSE[rounded]) {
                        result.push(ERCC_REVERSE[rounded]);
                    } else {
                        result.push(part);
                    }
                } else {
                    result.push(part);
                }
            }
            return result.join('');
        }

        function generateKey() {
            let key = {};
            let used = new Set();
            for (let i = 32; i < 127; i++) {
                let binary = i.toString(2).padStart(8, '0');
                let num;
                do {
                    num = Math.floor(Math.random() * 1000);
                } while (used.has(num));
                used.add(num);
                key[binary] = num;
            }
            return key;
        }

        function asciiToNumbers(text, key) {
            let nums = [];
            for (let ch of text) {
                let code = ch.charCodeAt(0);
                if (code >= 32 && code < 127) {
                    let binary = code.toString(2).padStart(8, '0');
                    nums.push(key[binary]);
                } else {
                    nums.push(ch);
                }
            }
            let keyStr = "KEY: " + Object.entries(key).map(([k, v]) => `${k}:${v}`).join(", ");
            return { encrypted: nums.join(' '), keyStr, key };
        }

        function numbersToAscii(text, keyStr) {
            if (!keyStr.startsWith("KEY: ")) return null;
            let key = {};
            let pairs = keyStr.substring(5).split(", ");
            for (let pair of pairs) {
                let [binary, num] = pair.split(':');
                key[num] = binary;
            }
            let result = [];
            let parts = text.split(' ');
            for (let part of parts) {
                if (key[part]) {
                    let binary = key[part];
                    let code = parseInt(binary, 2);
                    if (!isNaN(code) && code >= 32 && code < 127) {
                        result.push(String.fromCharCode(code));
                    } else {
                        result.push(part);
                    }
                } else {
                    result.push(part);
                }
            }
            return result.join('');
        }

        function asciiBinaryEncrypt(text) {
            let result = [];
            for (let ch of text) {
                let code = ch.charCodeAt(0);
                if (code < 127) {
                    result.push(code.toString(2).padStart(8, '0'));
                } else {
                    result.push(ch);
                }
            }
            return result.join(' ');
        }

        function asciiBinaryDecrypt(text) {
            let parts = text.split(' ');
            let result = [];
            for (let part of parts) {
                if (part.length === 8 && /^[01]+$/.test(part)) {
                    let code = parseInt(part, 2);
                    result.push(String.fromCharCode(code));
                } else {
                    result.push(part);
                }
            }
            return result.join('');
        }

        async function fullEncrypt(text) {
            let layer1 = erccEncrypt(text);
            let key = generateKey();
            let layer2 = asciiToNumbers(layer1, key);
            let layer3 = asciiBinaryEncrypt(layer2.encrypted);
            return { encrypted: layer3, keyStr: layer2.keyStr };
        }

        async function fullDecrypt(encrypted, keyStr) {
            let layer3 = asciiBinaryDecrypt(encrypted);
            let layer2 = numbersToAscii(layer3, keyStr);
            if (!layer2) return null;
            let layer1 = erccDecrypt(layer2);
            return layer1;
        }

        function showDestructNotice() {
            let notice = document.createElement('div');
            notice.className = 'destruct-notice';
            notice.textContent = '💣 Сообщение самоуничтожится через 10 секунд!';
            document.body.appendChild(notice);
            setTimeout(() => notice.remove(), 10000);
        }

        function showMessageUI(text, isError = true) {
            let msgDiv = document.getElementById('authMessage');
            if (msgDiv) {
                msgDiv.textContent = text;
                msgDiv.className = `message ${isError ? 'message-error' : 'message-success'}`;
                msgDiv.style.display = 'block';
                setTimeout(() => { if(msgDiv) msgDiv.style.display = 'none'; }, 3000);
            }
        }

        // Навигация на телефоне
        window.openChat = function(contact) {
            document.getElementById('contactsScreen').classList.add('hide-on-mobile');
            document.getElementById('chatScreen').classList.add('show-on-mobile');
        };

        window.closeChat = function() {
            document.getElementById('contactsScreen').classList.remove('hide-on-mobile');
            document.getElementById('chatScreen').classList.remove('show-on-mobile');
            if (messagesUnsubscribe) messagesUnsubscribe();
            currentContact = null;
            document.getElementById('chatInputArea').style.display = 'none';
            document.getElementById('chatName').innerText = 'Выберите собеседника';
        };

        // Регистрация
        window.register = async () => {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            if (!email || !password) { showMessageUI('Заполните все поля', true); return; }
            if (password.length < 6) { showMessageUI('Пароль должен быть минимум 6 символов', true); return; }
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const globalId = generateGlobalId();
                await setDoc(doc(db, "users", userCred.user.uid), {
                    email: email,
                    globalId: globalId,
                    nickname: email.split('@')[0],
                    createdAt: new Date(),
                    contacts: []
                });
                showMessageUI('Регистрация успешна!', false);
                setTimeout(() => window.showLogin(), 1500);
            } catch (error) { showMessageUI(error.message, true); }
        };

        // Вход
        window.login = async () => {
            const identifier = document.getElementById('loginIdentifier').value;
            const password = document.getElementById('loginPassword').value;
            if (!identifier || !password) { showMessageUI('Заполните все поля', true); return; }
            try {
                let email = identifier;
                if (!identifier.includes('@')) {
                    const usersQuery = query(collection(db, "users"), where("globalId", "==", identifier));
                    const usersSnap = await getDocs(usersQuery);
                    if (usersSnap.empty) { showMessageUI('Global ID не найден', true); return; }
                    email = usersSnap.docs[0].data().email;
                }
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) { showMessageUI('Неверный email/Global ID или пароль', true); }
        };

        window.logout = async () => {
            if (messagesUnsubscribe) messagesUnsubscribe();
            await signOut(auth);
        };

        // Поиск
        window.searchUser = async () => {
            const searchInput = document.getElementById('searchInput').value.trim();
            if (!searchInput) return;
            const usersQuery = query(collection(db, "users"), where("globalId", "==", searchInput));
            const usersSnap = await getDocs(usersQuery);
            if (usersSnap.empty) { alert('Пользователь не найден'); return; }
            const userDoc = usersSnap.docs[0];
            const userData = userDoc.data();
            if (userDoc.id === currentUser.uid) { alert('Это вы сами'); return; }
            const currentUserRef = doc(db, "users", currentUser.uid);
            const currentUserSnap = await getDoc(currentUserRef);
            const currentContacts = currentUserSnap.data().contacts || [];
            if (!currentContacts.some(c => c.uid === userDoc.id)) {
                await updateDoc(currentUserRef, {
                    contacts: arrayUnion({
                        uid: userDoc.id,
                        globalId: userData.globalId,
                        nickname: userData.nickname,
                        email: userData.email,
                        addedAt: new Date()
                    })
                });
            }
            document.getElementById('searchInput').value = '';
            loadContacts();
        };

        async function loadContacts() {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            const userData = userDoc.data();
            contacts = userData.contacts || [];
            const contactsList = document.getElementById('contactsList');
            contactsList.innerHTML = '';
            if (contacts.length === 0) {
                contactsList.innerHTML = '<div style="padding: 20px; text-align: center; color: #88A9C4;">Нет контактов<br><span style="font-size: 11px;">Используйте поиск по Global ID</span></div>';
                return;
            }
            for (const contact of contacts) {
                const contactDiv = document.createElement('div');
                contactDiv.className = 'contact-item';
                contactDiv.onclick = () => selectContact(contact);
                contactDiv.innerHTML = `
                    <div class="contact-avatar">${contact.nickname?.charAt(0).toUpperCase() || '👤'}</div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.nickname || contact.globalId?.substring(0, 8)}</div>
                        <div class="contact-status">${contact.globalId?.substring(0, 12)}...</div>
                    </div>
                `;
                contactsList.appendChild(contactDiv);
            }
        }

        async function selectContact(contact) {
            currentContact = contact;
            
            // Обновляем шапку чата
            document.getElementById('chatName').innerHTML = contact.nickname || contact.globalId?.substring(0, 8);
            document.getElementById('chatStatus').innerHTML = `Global ID: ${contact.globalId}`;
            document.getElementById('chatAvatar').innerHTML = contact.nickname?.charAt(0).toUpperCase() || '🧊';
            document.getElementById('chatInputArea').style.display = 'flex';
            
            // Открываем чат на телефоне
            if (window.innerWidth <= 768) {
                document.getElementById('contactsScreen').classList.add('hide-on-mobile');
                document.getElementById('chatScreen').classList.add('show-on-mobile');
            }
            
            if (messagesUnsubscribe) messagesUnsubscribe();
            
            const chatId = [currentUser.uid, contact.uid].sort().join('_');
            const chatRef = doc(db, "chats", chatId);
            const chatDoc = await getDoc(chatRef);
            if (!chatDoc.exists()) {
                await setDoc(chatRef, { participants: [currentUser.uid, contact.uid], createdAt: new Date(), lastMessage: null });
            }
            
            const messagesRef = collection(db, "chats", chatId, "messages");
            const q = query(messagesRef, orderBy("timestamp", "asc"));
            
            messagesUnsubscribe = onSnapshot(q, async (snapshot) => {
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = '';
                for (const docSnap of snapshot.docs) {
                    const msg = docSnap.data();
                    const isSent = msg.from === currentUser.uid;
                    let decryptedText = msg.text;
                    if (msg.encrypted && msg.keyStr) {
                        try {
                            decryptedText = await fullDecrypt(msg.text, msg.keyStr);
                            if (!decryptedText) decryptedText = '🔒 Ошибка расшифровки';
                        } catch(e) { decryptedText = '🔒 Зашифрованное сообщение'; }
                    }
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message-bubble ${isSent ? 'message-sent' : 'message-received'}`;
                    messageDiv.innerHTML = `
                        <div>${escapeHtml(decryptedText)}</div>
                        <div class="message-time">${msg.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || ''}</div>
                        <div class="message-self-destruct">💣 Самоуничтожится через 10 сек</div>
                    `;
                    messagesArea.appendChild(messageDiv);
                    if (msg.messageId && !destructTimeouts[msg.messageId] && !isSent) {
                        destructTimeouts[msg.messageId] = setTimeout(async () => {
                            await deleteDoc(doc(db, "chats", chatId, "messages", docSnap.id));
                            delete destructTimeouts[msg.messageId];
                        }, 10000);
                        showDestructNotice();
                    }
                }
                messagesArea.scrollTop = messagesArea.scrollHeight;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.sendMessage = async () => {
            const messageInput = document.getElementById('messageInput');
            const text = messageInput.value.trim();
            if (!text || !currentContact) return;
            const chatId = [currentUser.uid, currentContact.uid].sort().join('_');
            const { encrypted, keyStr } = await fullEncrypt(text);
            const messageId = Date.now().toString() + Math.random().toString(36);
            await addDoc(collection(db, "chats", chatId, "messages"), {
                from: currentUser.uid,
                to: currentContact.uid,
                text: encrypted,
                encrypted: true,
                keyStr: keyStr,
                timestamp: new Date(),
                messageId: messageId
            });
            const chatRef = doc(db, "chats", chatId);
            await updateDoc(chatRef, { lastMessage: text.substring(0, 50), lastMessageTime: new Date() });
            messageInput.value = '';
        };

        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.searchUser(); });

        window.showRegister = () => {
            document.getElementById('loginMode').style.display = 'none';
            document.getElementById('registerMode').style.display = 'block';
            document.getElementById('authMessage').style.display = 'none';
        };
        window.showLogin = () => {
            document.getElementById('loginMode').style.display = 'block';
            document.getElementById('registerMode').style.display = 'none';
            document.getElementById('authMessage').style.display = 'none';
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                currentUserData = userDoc.data();
                if (!currentUserData) {
                    const globalId = generateGlobalId();
                    await setDoc(doc(db, "users", user.uid), {
                        email: user.email,
                        globalId: globalId,
                        nickname: user.email.split('@')[0],
                        createdAt: new Date(),
                        contacts: []
                    });
                    currentUserData = { globalId, nickname: user.email.split('@')[0] };
                }
                document.getElementById('authForm').style.display = 'none';
                document.getElementById('messengerApp').style.display = 'flex';
                document.getElementById('userAvatar').innerText = currentUserData.nickname?.charAt(0).toUpperCase() || 'U';
                document.getElementById('userName').innerText = currentUserData.nickname || user.email.split('@')[0];
                const shortGlobalId = currentUserData.globalId ? currentUserData.globalId.substring(0, 12) + '...' : '—';
                document.getElementById('userGlobalId').innerHTML = shortGlobalId;
                loadContacts();
            } else {
                if (messagesUnsubscribe) messagesUnsubscribe();
                currentContact = null;
                document.getElementById('authForm').style.display = 'flex';
                document.getElementById('messengerApp').style.display = 'none';
                document.getElementById('loginIdentifier').value = '';
                document.getElementById('loginPassword').value = '';
                // Сбрасываем навигацию
                document.getElementById('contactsScreen').classList.remove('hide-on-mobile');
                document.getElementById('chatScreen').classList.remove('show-on-mobile');
            }
        });
    </script>
</body>
</html>
